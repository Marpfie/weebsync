query FriendMediaLists($userId: Int!, $type: MediaType!) {
    MediaListCollection(userId: $userId, type: $type, status_in: [COMPLETED, CURRENT]) {
        lists {
            name
            status
            entries {
                id
                status
                score(format: POINT_10_DECIMAL)
                progress
                media {
                    id
                    type
                    format
                    status
                    siteUrl
                    title {
                        romaji
                        english
                        native
                    }
                    coverImage {
                        medium
                        color
                    }
                    averageScore
                    genres
                    episodes
                    chapters
                }
            }
        }
    }
}
